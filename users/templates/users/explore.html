{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>CareerLens | Explore Jobs</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              DEFAULT: '#0A192F',
              light: '#112240',
              lighter: '#233554',
            },
            electric: '#007BFF', 
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .glass-card:hover {
      border-color: rgba(0, 123, 255, 0.5);
      transform: translateY(-3px);
    }
  </style>
</head>

<body class="bg-navy text-gray-200 font-sans antialiased min-h-screen flex flex-col">
  
  <nav class="sticky top-0 z-50 border-b border-white/10 bg-navy/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        
        <a href="{% url 'dashboard' %}" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
          <div class="w-10 h-10 bg-electric rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
          </div>
          <span class="text-2xl font-bold text-white tracking-tight">CareerLens</span>
        </a>

        <div class="hidden md:flex items-center space-x-6">
          <span class="text-gray-300 font-medium text-sm">
            Welcome, <span class="text-white font-bold">{{ user.first_name|default:user.username }}</span>
          </span>
          
          <!---- Mode Switcher -->
          <form action="{% url 'toggle_mode' %}" method="POST" class="inline">
            {% csrf_token %}
            <button type="submit" class="bg-navy-lighter border border-white/10 text-gray-300 px-4 py-2 rounded-full font-semibold hover:text-white hover:bg-white/5 transition-all shadow-lg flex items-center gap-2 text-sm">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
              Switch to {% if user.is_recruiter %}Job Seeker{% else %}Recruiter{% endif %}
            </button>
          </form>

          <!-- EXISTING: Log Out -->
          <form action="{% url 'logout' %}" method="POST" class="inline">
            {% csrf_token %}
            <button type="submit" class="bg-transparent border border-red-500/50 text-red-400 px-6 py-2 rounded-full font-semibold hover:bg-red-500 hover:text-white transition-all shadow-lg hover:shadow-red-500/20 text-sm">
              Log Out
            </button>
          </form>
        </div>

      </div>
    </div>
  </nav>
  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    
    <div class="mb-10 text-center">
      <h1 class="text-4xl font-extrabold text-white mb-4">Find Your Next Big Opportunity</h1>
      <p class="text-gray-400 text-lg">Search through thousands of curated tech roles.</p>
    </div>

    <div class="mb-12">
      <div class="relative max-w-3xl mx-auto mb-6">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
        <input type="text" id="search-input" class="block w-full pl-12 pr-4 py-4 bg-navy-light border border-white/10 rounded-2xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-electric focus:border-transparent transition-all" placeholder="Search by job title, skill, or company...">
      </div>

      <div id="filter-container" class="flex flex-wrap justify-center gap-3 max-w-4xl mx-auto">
        <button class="filter-btn px-5 py-2 rounded-full font-medium transition-colors bg-electric/20 text-electric border border-electric/30" data-category="All">All</button>
        <button class="filter-btn px-5 py-2 rounded-full font-medium transition-colors bg-navy-light text-gray-300 border border-white/10 hover:bg-white/10" data-category="IT">IT Support</button>
        <button class="filter-btn px-5 py-2 rounded-full font-medium transition-colors bg-navy-light text-gray-300 border border-white/10 hover:bg-white/10" data-category="Engineering">Engineering</button>
        <button class="filter-btn px-5 py-2 rounded-full font-medium transition-colors bg-navy-light text-gray-300 border border-white/10 hover:bg-white/10" data-category="Development">Software Development</button>
        <button class="filter-btn px-5 py-2 rounded-full font-medium transition-colors bg-navy-light text-gray-300 border border-white/10 hover:bg-white/10" data-category="Management">Management</button>
        <button class="filter-btn px-5 py-2 rounded-full font-medium transition-colors bg-navy-light text-gray-300 border border-white/10 hover:bg-white/10" data-category="AI">Data / AI</button>
      </div>
    </div>

    <div id="job-listings-grid" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">   
    </div>

    </div>
  <div id="load-more-container" class="mt-12 text-center">
      <button id="load-more-btn" class="px-8 py-4 bg-transparent border-2 border-electric text-electric rounded-2xl font-bold text-lg hover:bg-electric hover:text-white transition-all">
        Explore More Jobs
      </button>
    </div>
    </main>
  <footer class="bg-navy py-12 border-t border-white/5 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-600 text-xs">
      © 2024 CareerLens Inc. All rights reserved.
    </div>
  </footer>


  <script>
  // 1. Global State Variables
  let jobsData = []; // Starts empty, fills via your Django DB
  let currentlyDisplayed = 9;
  const jobsToLoad = 9;
  let currentSearchQuery = "";
  let currentCategory = "All";

  // 2. Helper Functions
  function calculateDaysAgo(dateString) {
    if (dateString === "----") return "Recently";
    const postedDate = new Date(dateString);
    const today = new Date(); 
    const timeDifference = today - postedDate;
    const daysAgo = Math.floor(timeDifference / (1000 * 3600 * 24));
    
    if (daysAgo <= 0) return "Posted today";
    if (daysAgo === 1) return "Posted 1 day ago";
    return `Posted ${daysAgo} days ago`;
  }

  function formatSalary(num) {
    if (num === "----") return "Undisclosed Salary";
    return `$${Math.floor(num / 1000)}k`;
  }

  // 3. Fetch Data from Django Database
  async function fetchJobsFromDatabase() {
    const gridContainer = document.getElementById('job-listings-grid');
    gridContainer.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">Loading live jobs from database...</div>`;
    
    try {
      // Hit the new internal API endpoint you just built
      const response = await fetch('/jobs/api/all/');
      const data = await response.json();
      
      if (response.ok) {
        jobsData = data.jobs || [];
        filterAndRenderJobs();
      } else {
        throw new Error(data.error || 'Failed to fetch jobs');
      }

    } catch (error) {
      console.error("Database Error:", error.message);
      gridContainer.innerHTML = `<div class="col-span-full text-center py-10 text-red-400 font-bold">Failed to connect to the database.</div>`;
    }
  }

  // 4. The Master Render & Filter Function
  function filterAndRenderJobs() {
    const gridContainer = document.getElementById('job-listings-grid');
    const loadMoreContainer = document.getElementById('load-more-container');
    gridContainer.innerHTML = ''; 

    // Filter based on Search AND Category
    const filteredJobs = jobsData.filter(job => {
      const matchesCategory = currentCategory === "All" || job.type === currentCategory;
      const searchLower = currentSearchQuery.toLowerCase();
      const matchesSearch = 
        job.title.toLowerCase().includes(searchLower) || 
        job.company.toLowerCase().includes(searchLower) ||
        job.desc.toLowerCase().includes(searchLower);

      return matchesCategory && matchesSearch;
    });

    const jobsToRender = filteredJobs.slice(0, currentlyDisplayed);

    if (jobsToRender.length === 0) {
      gridContainer.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">No jobs found matching your criteria. Try adjusting your search.</div>`;
    } else {
      jobsToRender.forEach(job => {
        const companyInitials = job.company.substring(0, 2).toUpperCase();
        const timeAgoText = calculateDaysAgo(job.postedDate);
        
        const salaryText = job.salaryMin === "----" 
            ? "Salary Undisclosed" 
            : `${formatSalary(job.salaryMin)} - ${formatSalary(job.salaryMax)}`;

        const cardHTML = `
          <div class="glass-card rounded-2xl p-6 flex flex-col h-full relative overflow-hidden">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="text-sm font-semibold text-gray-400 uppercase tracking-wider">${job.company}</span>
                <h3 class="text-xl font-bold text-white mt-1 line-clamp-2" title="${job.title}">${job.title}</h3>
              </div>
              <div class="w-12 h-12 rounded-lg bg-navy-lighter flex items-center justify-center border border-white/5 flex-shrink-0">
                <span class="text-electric font-bold text-lg">${companyInitials}</span>
              </div>
            </div>

            <div class="flex flex-wrap gap-2 mb-4 text-xs font-medium">
              <span class="px-3 py-1 rounded-md bg-green-500/10 text-green-400 border border-green-500/20">${salaryText}</span>
              <span class="px-3 py-1 rounded-md bg-white/5 text-gray-300 border border-white/10">${job.empType}</span>
              <span class="px-3 py-1 rounded-md bg-white/5 text-gray-300 border border-white/10">${job.mode}</span>
            </div>

            <p class="text-sm text-gray-400 mb-8 line-clamp-3">${job.desc}</p>

            <div class="mt-auto pt-4 border-t border-white/10 flex items-center justify-between">
              <span class="text-xs text-gray-500">${timeAgoText}</span>
              <a href="${job.link}" class="px-6 py-2 bg-electric text-white font-bold rounded-lg hover:bg-blue-600 transition-colors text-center">
                Apply Now
              </a>
            </div>
          </div>
        `;
        gridContainer.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    if (currentlyDisplayed >= filteredJobs.length) {
      loadMoreContainer.style.display = 'none';
    } else {
      loadMoreContainer.style.display = 'block';
    }
  }

  // 5. Event Listeners for Interaction
  document.getElementById('search-input').addEventListener('input', (e) => {
    currentSearchQuery = e.target.value;
    currentlyDisplayed = 9; 
    filterAndRenderJobs();
  });

  const filterButtons = document.querySelectorAll('.filter-btn');
  filterButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
      filterButtons.forEach(b => {
        b.className = "filter-btn px-5 py-2 rounded-full font-medium transition-colors bg-navy-light text-gray-300 border border-white/10 hover:bg-white/10";
      });
      
      const clickedBtn = e.target;
      clickedBtn.className = "filter-btn px-5 py-2 rounded-full font-medium transition-colors bg-electric/20 text-electric border border-electric/30";
      
      currentCategory = clickedBtn.getAttribute('data-category');
      currentlyDisplayed = 9; 
      filterAndRenderJobs();
    });
  });

  document.getElementById('load-more-btn').addEventListener('click', () => {
    currentlyDisplayed += jobsToLoad;
    filterAndRenderJobs();
  });

  // 6. Initialize App: Fetch data on page load
  document.addEventListener('DOMContentLoaded', fetchJobsFromDatabase);
</script>
  </body>
</html>
