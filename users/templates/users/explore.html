{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>CareerLens | Explore Jobs</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0A192F', light: '#112240', lighter: '#233554' },
            electric: '#007BFF', 
            emerald: '#1097b9',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      border-color: rgba(0, 123, 255, 0.5);
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>

<body class="bg-navy text-gray-200 font-sans antialiased min-h-screen flex flex-col">
  {% csrf_token %} <!-- Hidden token for AJAX applications -->

  <nav class="sticky top-0 z-50 border-b border-white/10 bg-navy/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <a href="{% url 'dashboard' %}" class="flex items-center gap-2">
          <div class="w-10 h-10 bg-electric rounded-xl flex items-center justify-center shadow-lg shadow-electric/20">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2"/></svg>
          </div>
          <span class="text-2xl font-bold text-white tracking-tight">CareerLens</span>
        </a>

        <div class="hidden md:flex items-center space-x-6">
          <span class="text-gray-300 font-medium text-sm">Welcome, <span class="text-white font-bold">{{ user.first_name|default:user.username }}</span></span>
          <a href="{% url 'dashboard' %}" class="bg-navy-lighter border border-white/10 text-gray-300 px-6 py-2 rounded-full text-sm hover:text-white transition-all">Back to Dashboard</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
    <div class="mb-12 text-center">
      <h1 class="text-5xl font-extrabold text-white mb-4">Discover Your Future</h1>
      <p class="text-gray-400 text-lg">Luna has found <span class="text-electric font-bold" id="job-count">...</span> opportunities waiting for you.</p>
    </div>

    <div class="mb-12">
      <div class="relative max-w-3xl mx-auto mb-8">
        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <input type="text" id="search-input" class="block w-full pl-14 pr-6 py-5 bg-navy-light/50 border border-white/10 rounded-3xl text-white placeholder-gray-500 focus:ring-2 focus:ring-electric focus:border-transparent transition-all outline-none" placeholder="Search by title, tech stack, or company...">
      </div>

      <div id="filter-container" class="flex flex-wrap justify-center gap-3">
        <button class="filter-btn px-6 py-2.5 rounded-full font-semibold transition-all bg-electric text-white shadow-lg shadow-electric/20" data-category="All">All Roles</button>
        <button class="filter-btn px-6 py-2.5 rounded-full font-semibold transition-all bg-navy-light text-gray-400 border border-white/10 hover:border-electric/50" data-category="IT">IT Support</button>
        <button class="filter-btn px-6 py-2.5 rounded-full font-semibold transition-all bg-navy-light text-gray-400 border border-white/10 hover:border-electric/50" data-category="Engineering">Engineering</button>
        <button class="filter-btn px-6 py-2.5 rounded-full font-semibold transition-all bg-navy-light text-gray-400 border border-white/10 hover:border-electric/50" data-category="Development">Development</button>
        <button class="filter-btn px-6 py-2.5 rounded-full font-semibold transition-all bg-navy-light text-gray-400 border border-white/10 hover:border-electric/50" data-category="AI">Data / AI</button>
      </div>
    </div>

    <div id="job-listings-grid" class="grid gap-8 md:grid-cols-2 lg:grid-cols-3"></div>

    <div id="load-more-container" class="mt-16 text-center">
      <button id="load-more-btn" class="px-10 py-4 bg-transparent border-2 border-electric text-electric rounded-2xl font-bold hover:bg-electric hover:text-white transition-all shadow-lg hover:shadow-electric/30">
        Load More Opportunities
      </button>
    </div>
  </main>

  <footer class="bg-navy py-12 border-t border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-600 text-xs uppercase tracking-widest">
      © 2026 CareerLens Inc. Powered by Luna AI
    </div>
  </footer>

  <script>
    let jobsData = [];
    let currentlyDisplayed = 9;
    const jobsToLoad = 9;
    let currentSearchQuery = "";
    let currentCategory = "All";

    // ── Database Fetch ──────────────────────────────────────────────────
    async function fetchJobsFromDatabase() {
      const gridContainer = document.getElementById('job-listings-grid');
      gridContainer.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 animate-pulse">Consulting the database...</div>`;
      
      try {
        const response = await fetch('/jobs/api/all/');
        const data = await response.json();
        
        if (response.ok) {
          jobsData = data.jobs || [];
          document.getElementById('job-count').innerText = jobsData.length;
          filterAndRenderJobs();
        }
      } catch (error) {
        gridContainer.innerHTML = `<div class="col-span-full text-center py-10 text-red-400">Error connecting to the talent engine.</div>`;
      }
    }

    // ── Application Method (Luna Integration) ──────────────────────────
    async function applyForJob(jobId, btnElement) {
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const originalText = btnElement.innerText;
        
        btnElement.disabled = true;
        btnElement.innerText = "Applying...";
        btnElement.classList.add('opacity-50', 'cursor-not-allowed');

        try {
            const response = await fetch(`/apply/${jobId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                btnElement.innerText = "✓ Applied";
                btnElement.classList.replace('bg-electric', 'bg-green-500');
                // Optional: Alert from Luna
                alert("Luna: Great choice! Your application has been sent to the recruiter.");
            } else {
                alert("You've already applied for this role!");
                btnElement.innerText = originalText;
                btnElement.disabled = false;
                btnElement.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        } catch (error) {
            console.error("Application failed", error);
        }
    }

    // ── Master Render ──────────────────────────────────────────────────
    function filterAndRenderJobs() {
      const gridContainer = document.getElementById('job-listings-grid');
      const loadMoreContainer = document.getElementById('load-more-container');
      gridContainer.innerHTML = ''; 

      const filteredJobs = jobsData.filter(job => {
        const matchesCategory = currentCategory === "All" || job.type === currentCategory;
        const searchLower = currentSearchQuery.toLowerCase();
        const matchesSearch = job.title.toLowerCase().includes(searchLower) || job.company.toLowerCase().includes(searchLower);
        return matchesCategory && matchesSearch;
      });

      const jobsToRender = filteredJobs.slice(0, currentlyDisplayed);

      if (jobsToRender.length === 0) {
        gridContainer.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">No matches found. Try broadening your search!</div>`;
      } else {
        jobsToRender.forEach(job => {
          const cardHTML = `
            <div class="glass-card rounded-3xl p-8 flex flex-col h-full">
              <div class="flex justify-between items-start mb-6">
                <div>
                  <span class="text-xs font-bold text-electric uppercase tracking-widest">${job.company}</span>
                  <h3 class="text-2xl font-extrabold text-white mt-2">${job.title}</h3>
                </div>
                <div class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-electric font-black text-xl">
                  ${job.company.substring(0,2).toUpperCase()}
                </div>
              </div>

              <div class="flex flex-wrap gap-2 mb-6">
                <span class="px-3 py-1 rounded-full bg-electric/10 text-electric text-xs font-bold border border-electric/20">${job.mode}</span>
                <span class="px-3 py-1 rounded-full bg-white/5 text-gray-400 text-xs font-bold border border-white/10">${job.empType}</span>
              </div>

              <p class="text-gray-400 text-sm leading-relaxed mb-8 line-clamp-3">${job.desc}</p>

              <div class="mt-auto pt-6 border-t border-white/10 flex items-center justify-between">
                <span class="text-xs font-medium text-gray-500">Posted Recently</span>
                <button onclick="applyForJob(${job.id}, this)" class="px-8 py-3 bg-electric text-white font-bold rounded-xl hover:bg-blue-600 transition-all shadow-lg shadow-electric/20">
                  Apply Now
                </button>
              </div>
            </div>`;
          gridContainer.insertAdjacentHTML('beforeend', cardHTML);
        });
      }

      loadMoreContainer.style.display = currentlyDisplayed >= filteredJobs.length ? 'none' : 'block';
    }

    // ── Listeners ──────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', (e) => {
      currentSearchQuery = e.target.value;
      currentlyDisplayed = 9; 
      filterAndRenderJobs();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.className = "filter-btn px-6 py-2.5 rounded-full font-semibold transition-all bg-navy-light text-gray-400 border border-white/10 hover:border-electric/50";
        });
        e.target.className = "filter-btn px-6 py-2.5 rounded-full font-semibold transition-all bg-electric text-white shadow-lg shadow-electric/20";
        currentCategory = e.target.getAttribute('data-category');
        currentlyDisplayed = 9; 
        filterAndRenderJobs();
      });
    });

    document.getElementById('load-more-btn').addEventListener('click', () => {
      currentlyDisplayed += jobsToLoad;
      filterAndRenderJobs();
    });

    document.addEventListener('DOMContentLoaded', fetchJobsFromDatabase);
  </script>
</body>
</html>
