{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>CareerLens | Talent Pool</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              DEFAULT: '#0A192F',
              light: '#112240',
              lighter: '#233554',
            },
            electric: {
                DEFAULT: '#007BFF',
                hover: '#0056b3'
            },
            emerald: {
                DEFAULT: '#1097b9',
                hover: '#0d7a96'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }
    .glass-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(16, 165, 185, 0.3);
    }
  </style>
</head>

<body class="bg-navy text-gray-200 font-sans antialiased min-h-screen flex flex-col">
  
  <!-- Navbar -->
  <nav class="sticky top-0 z-50 border-b border-white/10 bg-navy/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <a href="{% url 'dashboard' %}" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
          <div class="w-10 h-10 bg-emerald rounded-xl flex items-center justify-center shadow-lg shadow-emerald/20">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
          </div>
          <span class="text-2xl font-bold text-white tracking-tight">CareerLens</span>
        </a>
        <div class="hidden md:flex items-center space-x-6">
          <span class="text-gray-300 font-medium text-sm">
            Recruiter Portal
          </span>
          <a href="{% url 'dashboard' %}" class="bg-navy-lighter border border-white/10 text-gray-300 px-6 py-2 rounded-full font-semibold hover:text-white hover:bg-white/5 transition-all text-sm">
            Back to Dashboard
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
    
    <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
      <div>
        <h1 class="text-4xl font-extrabold text-white mb-2">Talent Pool</h1>
        <p class="text-gray-400 text-lg">Review applications and schedule interviews with top candidates.</p>
      </div>
      <div class="bg-emerald/10 border border-emerald/20 text-emerald px-4 py-2 rounded-lg font-mono text-sm font-bold flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-emerald animate-pulse"></div>
        3 New Applications
      </div>
    </div>

    <!-- Applicants List Container -->
    <div id="applicants-container" class="space-y-4">
      <!-- JavaScript will inject the applicant cards here -->
    </div>

  </main>

  <footer class="bg-navy py-12 border-t border-white/5 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-600 text-xs">
      © 2024 CareerLens Inc. All rights reserved.
    </div>
  </footer>

  <script>
    // 1. INJECT REAL DATABASE DATA FROM DJANGO
    let applicants = JSON.parse('{{ applications_json|safe|escapejs }}');

    const container = document.getElementById('applicants-container');

    // 2. Helper to get CSRF token for secure Django POST requests
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // 3. Render the UI
    function renderApplicants() {
      container.innerHTML = '';
      
      if (applicants.length === 0) {
          container.innerHTML = '<p class="text-gray-400 text-center py-10">No applications found in the database yet.</p>';
          return;
      }

      applicants.forEach(app => {
        let statusBadge = '';
        let actionButtons = '';

        // UI State Machine
        if (app.status === 'pending') {
          statusBadge = `<span class="px-3 py-1 bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 rounded-full text-xs font-bold uppercase tracking-wide">Pending Review</span>`;
          actionButtons = `
            <button onclick="updateBackendStatus(${app.id}, 'approved')" class="px-4 py-2 bg-emerald text-white text-sm font-bold rounded-lg hover:bg-emerald-hover transition-colors shadow-lg shadow-emerald/20">Approve</button>
            <button onclick="updateBackendStatus(${app.id}, 'rejected')" class="px-4 py-2 bg-transparent text-gray-400 border border-white/10 text-sm font-bold rounded-lg hover:bg-red-500/10 hover:text-red-400 hover:border-red-500/30 transition-colors">Decline</button>
          `;
        } else if (app.status === 'approved') {
          statusBadge = `<span class="px-3 py-1 bg-emerald/10 text-emerald border border-emerald/20 rounded-full text-xs font-bold uppercase tracking-wide">Approved</span>`;
          actionButtons = `
            <button onclick="updateBackendStatus(${app.id}, 'scheduled')" class="px-4 py-2 bg-electric text-white text-sm font-bold rounded-lg hover:bg-blue-600 transition-colors shadow-lg shadow-electric/20 flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              Schedule Interview
            </button>
          `;
        } else if (app.status === 'scheduled') {
          statusBadge = `<span class="px-3 py-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded-full text-xs font-bold uppercase tracking-wide flex items-center gap-1">Interview Scheduled</span>`;
          actionButtons = `<div class="text-sm text-gray-400 font-medium bg-navy-light px-4 py-2 rounded-lg border border-white/5">Set for: <span class="text-white">${app.interviewDate || 'In 3 Days'}</span></div>`;
        } else if (app.status === 'rejected') {
          statusBadge = `<span class="px-3 py-1 bg-red-500/10 text-red-400 border border-red-500/20 rounded-full text-xs font-bold uppercase tracking-wide">Declined</span>`;
          actionButtons = `<span class="text-sm text-gray-500 italic">Archived</span>`;
        }

        const card = `
          <div class="glass-card p-5 rounded-2xl flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
            <div class="flex items-center gap-5">
              <div class="w-12 h-12 rounded-full bg-navy-light border border-white/10 flex items-center justify-center text-lg font-bold text-gray-300">
                ${app.name.charAt(0)}
              </div>
              <div>
                <h3 class="text-lg font-bold text-white">${app.name}</h3>
                <div class="flex items-center gap-3 mt-1">
                  <span class="text-sm text-emerald font-medium">${app.role}</span>
                  <span class="w-1 h-1 rounded-full bg-gray-600"></span>
                  <span class="text-xs text-gray-400">Applied ${app.date}</span>
                </div>
              </div>
            </div>
            
            <div class="flex items-center gap-6 w-full md:w-auto justify-between md:justify-end border-t border-white/5 md:border-none pt-4 md:pt-0">
              <div class="flex flex-col items-center mr-4">
                <span class="text-xs text-gray-500 uppercase tracking-wider font-bold mb-1">AI Match</span>
                <span class="text-lg font-black text-electric">${app.match}%</span>
              </div>
              
              <div class="flex flex-col items-end gap-3 min-w-[140px]">
                ${statusBadge}
                <div class="flex gap-2">
                  ${actionButtons}
                </div>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', card);
      });
    }

    // 4. Send the update to Django Backend!
    window.updateBackendStatus = (id, newStatus) => {
      // 1. Update UI instantly so it feels fast
      const applicant = applicants.find(a => a.id === id);
      if (applicant) applicant.status = newStatus;
      renderApplicants();

      // 2. Send the actual change to the database behind the scenes
      fetch(`/update-status/${id}/`, {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken') // Django requires this!
          },
          body: JSON.stringify({ status: newStatus })
      })
      .then(response => response.json())
      .then(data => {
          if(data.error) console.error("Database error:", data.error);
          else console.log("Database updated successfully!");
      });
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', renderApplicants);
  </script>
</body>
</html>
