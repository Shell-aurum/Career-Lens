{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>CareerLens | Analyze Resume</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0A192F', light: '#112240', lighter: '#233554' },
            electric: '#007BFF',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px dashed rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }
    .glass-card:hover, .glass-card.dragover {
      background: rgba(0, 123, 255, 0.08);
      border-color: rgba(0, 123, 255, 0.8);
    }
    .hero-gradient {
      background: radial-gradient(circle at top right, rgba(0, 123, 255, 0.15), transparent),
                  radial-gradient(circle at bottom left, rgba(0, 123, 255, 0.1), transparent);
    }
  </style>
</head>
<body class="bg-navy text-gray-200 font-sans antialiased min-h-screen flex flex-col hero-gradient">

  <nav class="sticky top-0 z-50 border-b border-white/10 bg-navy/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <a href="{% url 'dashboard' %}" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
          <div class="w-10 h-10 bg-electric rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
          </div>
          <span class="text-2xl font-bold text-white tracking-tight">CareerLens</span>
        </a>
        <a href="{% url 'dashboard' %}" class="text-sm font-semibold text-gray-400 hover:text-white transition-colors">
          &larr; Back to Dashboard
        </a>
      </div>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="max-w-2xl w-full text-center">
      
      <h1 class="text-4xl font-extrabold text-white mb-4">Resume Intelligence</h1>
      <p class="text-lg text-gray-400 mb-10">Upload your PDF resume to generate an ATS score, identify missing skills, and unlock personalized job recommendations.</p>

      <form id="resume-form" method="POST" action="#" enctype="multipart/form-data" class="w-full">
        {% csrf_token %}
        
        <label for="resume-upload" id="dropzone" class="glass-card rounded-3xl p-16 flex flex-col items-center justify-center cursor-pointer group relative overflow-hidden">
          
          <div class="w-20 h-20 bg-navy-lighter rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
            <svg class="w-10 h-10 text-electric" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
          </div>
          
          <h3 class="text-2xl font-bold text-white mb-2" id="file-name-display">Click or Drag PDF here</h3>
          <p class="text-gray-500 text-sm">Maximum file size: 5MB</p>

          <input id="resume-upload" name="resume_pdf" type="file" accept="application/pdf" class="hidden" required />
        </label>

        <button type="submit" id="analyze-btn" class="w-full mt-8 px-8 py-5 bg-electric text-white rounded-2xl font-bold text-xl hover:bg-blue-600 transition-all shadow-lg shadow-electric/25 flex items-center justify-center gap-3 opacity-50 cursor-not-allowed" disabled>
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
          </svg>
          Initiate Scan
        </button>
      </form>

    </div>
  </main>

<script>
  const fileInput = document.getElementById('resume-upload');
  const fileNameDisplay = document.getElementById('file-name-display');
  const analyzeBtn = document.getElementById('analyze-btn');
  const dropzone = document.getElementById('dropzone');
  const form = document.getElementById('resume-form');

  // Handle File Selection UI
  fileInput.addEventListener('change', function(e) {
    if (this.files && this.files.length > 0) {
      fileNameDisplay.textContent = this.files[0].name;
      fileNameDisplay.classList.add('text-electric');
      analyzeBtn.disabled = false;
      analyzeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
  });

  // Handle Drag & Drop
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropzone.addEventListener(eventName, e => {
      e.preventDefault();
      e.stopPropagation();
    });
  });

  ['dragenter', 'dragover'].forEach(eventName => {
    dropzone.addEventListener(eventName, () => dropzone.classList.add('dragover'));
  });

  ['dragleave', 'drop'].forEach(eventName => {
    dropzone.addEventListener(eventName, () => dropzone.classList.remove('dragover'));
  });

  dropzone.addEventListener('drop', (e) => {
    fileInput.files = e.dataTransfer.files;
    fileInput.dispatchEvent(new Event('change')); 
  });

  // Handle AJAX Form Submission to AI Backend
  form.addEventListener('submit', async (e) => {
    e.preventDefault(); // Prevent standard HTML submission
    
    // UI Loading State
    const originalBtnHTML = analyzeBtn.innerHTML;
    analyzeBtn.innerHTML = `Processing...`;
    analyzeBtn.disabled = true;

    const formData = new FormData(form);
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    try {
      const response = await fetch("{% url 'process_resume' %}", {
        method: 'POST',
        headers: {
          'X-CSRFToken': csrfToken
        },
        body: formData
      });

      const data = await response.json();

      if (response.ok) {
       // AI Pipeline Succeeded
        analyzeBtn.innerHTML = `Success! Redirecting...`;
        analyzeBtn.classList.replace('bg-electric', 'bg-green-500');
        
        // Save the resume_id locally just in case
        sessionStorage.setItem('current_resume_id', data.resume_id);
        
        // INSTANT REDIRECT TO THE NEW REPORT PAGE
        window.location.href = `/resume/report/${data.resume_id}/`;
        
      } else {
        // AI Pipeline Failed
        analyzeBtn.innerHTML = `Error: ${data.error || 'Upload failed'}`;
        analyzeBtn.classList.replace('bg-electric', 'bg-red-500');
      }

    } catch (error) {
      console.error('Submission error:', error);
      analyzeBtn.innerHTML = `Network Error`;
    }
  });
</script>
</body>
</html>
